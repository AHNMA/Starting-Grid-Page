name: Deploy to Hetzner Webspace

on:
  push:
    branches:
      - main # Or the branch you want to deploy from (e.g., master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Vite usually requires Node >= 18 or 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Vite App
        run: npm run build

      - name: Sync API Files to dist
        run: |
          # Since Vite copies public/ automatically, we ensure everything is correctly in dist/
          # Ensure config.php stays protected
          echo "Build completed successfully."

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp (FTPS)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set ftp:ssl-allow yes;
          set ftp:ssl-force true;
          set ssl:verify-certificate no;
          open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
          mirror -R -v \
            --exclude-glob .git/ \
            --exclude-glob node_modules/ \
            --exclude-glob upload/ \
            --exclude-glob config.php \
            --parallel=10 \
            ./dist/ /public_html/startinggrid/
          "
